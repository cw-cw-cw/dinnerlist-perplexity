services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: dinnerlist
      POSTGRES_PASSWORD: dinnerlist_dev
      POSTGRES_DB: dinnerlist
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
